name: Build Launchers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2 Framework
        run: |
          curl -LO https://github.com/libsdl-org/SDL/releases/download/release-2.30.10/SDL2-2.30.10.dmg
          hdiutil attach SDL2-2.30.10.dmg
          sudo cp -R /Volumes/SDL2/SDL2.framework /Library/Frameworks/
          hdiutil detach /Volumes/SDL2
      - name: Build
        run: |
          export MACOSX_DEPLOYMENT_TARGET=11.0
          c++ main.cpp game.cpp cluster.cpp resource.cpp market.cpp ship.cpp agent.cpp colony.cpp faction.cpp ui.cpp -O3 -std=c++11 -F/Library/Frameworks -I/Library/Frameworks/SDL2.framework/Headers -framework SDL2 -Wl,-rpath,@executable_path/../Frameworks -o game
      - name: Package App and DMG
        run: |
          mkdir -p Starcluster.app/Contents/MacOS
          mkdir -p Starcluster.app/Contents/Frameworks
          cp game Starcluster.app/Contents/MacOS/Starcluster
          
          # Bundle the official SDL2.framework
          cp -R /Library/Frameworks/SDL2.framework Starcluster.app/Contents/Frameworks/
          
          chmod +x Starcluster.app/Contents/MacOS/Starcluster
          
          # Basic Info.plist
          cat << 'PLIST' > Starcluster.app/Contents/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Starcluster</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.starcluster</string>
            <key>CFBundleName</key>
            <string>Starcluster</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          PLIST
          
          # Re-sign the app since install_name_tool breaks the binary signature
          codesign --force --deep --sign - Starcluster.app
          
          hdiutil create -volname "Starcluster" -srcfolder Starcluster.app -ov -format UDZO Starcluster.dmg
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starcluster-macOS
          path: Starcluster.dmg

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2 make
      - name: Build
        run: |
          make game CXX="g++ -static-libgcc -static-libstdc++"
          mv game.exe starcluster.exe
          mkdir -p dist
          cp starcluster.exe dist/
          cp /mingw64/bin/SDL2.dll dist/
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starcluster-Windows
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Build
        run: |
          make game
          mv game starcluster-linux
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starcluster-Linux
          path: starcluster-linux

  package-multiplatform:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-builds
          merge-multiple: false
      - name: Create Multiplatform Directory
        run: |
          mkdir Starcluster-Multiplatform
          mv all-builds/Starcluster-macOS/Starcluster.dmg Starcluster-Multiplatform/
          mv all-builds/Starcluster-Windows/starcluster.exe Starcluster-Multiplatform/
          mv all-builds/Starcluster-Windows/SDL2.dll Starcluster-Multiplatform/
          mv all-builds/Starcluster-Linux/starcluster-linux Starcluster-Multiplatform/
      - name: Upload Multiplatform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starcluster-Multiplatform
          path: Starcluster-Multiplatform/
